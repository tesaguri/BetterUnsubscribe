<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="unsubscribeTitle">Unsubscribe</title>
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="unsubSection">
      <h3 data-i18n="unsubscribeQuestion">
        Would you like to unsubscribe from this mailing list?
      </h3>
      <h4 id="nameAddress">"John Doe" &lt;John.Doe@example.com&gt;</h4>

      <button
        id="unsubscribeButton"
        class="button"
        data-i18n="unsubscribeButton"
        aria-label="Unsubscribe"
      >
        Unsubscribe
      </button>
      <button
        id="cancelButton"
        class="button"
        data-i18n="cancelButton"
        aria-label="Cancel"
      >
        Cancel
      </button>
    </div>

    <div id="confirmSection" hidden>
      <h3 data-i18n="confirmUnsubscribeTitle">Confirm Unsubscribe</h3>
      <p id="confirmWarning" class="confirm-warning"></p>
      <p class="confirm-label" data-i18n="confirmUnsubscribeMessage">
        You are about to unsubscribe from:
      </p>
      <div class="code-container">
        <code id="confirmTarget"></code>
      </div>
      <button
        id="confirmYesButton"
        class="button"
        data-i18n="confirmButton"
        aria-label="Yes, Unsubscribe"
      >
        Yes, Unsubscribe
      </button>
      <button
        id="confirmNoButton"
        class="button"
        data-i18n="cancelButton"
        aria-label="Cancel"
      >
        Cancel
      </button>
    </div>

    <div id="deleteDiv" class="button-delete button-dropdown">
      <button
        id="deleteButton"
        class="button"
        data-i18n="deleteButton"
        aria-label="Delete"
      >
        Delete ▼
      </button>
      <div>
        <ul id="dropdownList">
          <li>
            <button id="deleteOneButton">
              <span class="label" data-i18n="deleteOneButton"
                >Delete just this</span
              >
            </button>
          </li>
          <li>
            <button id="deleteAllNameAddrButton">
              <span class="label" data-i18n="deleteAllNameAddrButton"
                >Delete all from name-addr</span
              >
              <span class="scroll-x"
                >"John Doe" &lt;John.Doe@example.com&gt;</span
              >
            </button>
          </li>
          <li>
            <button id="deleteAllAddrButton">
              <span class="label" data-i18n="deleteAllAddrButton"
                >Delete all from addr-spec</span
              >
              <span class="scroll-x">John.Doe@example.com</span>
            </button>
          </li>
          <li>
            <button id="deleteAllDomainButton">
              <span class="label" data-i18n="deleteAllDomainButton"
                >Delete all from domain</span
              >
              <span class="scroll-x">example.com</span>
            </button>
          </li>
        </ul>
      </div>
    </div>

    <h4 id="statusText" hidden role="status">abc</h4>

    <div class="details">
      <p id="detailsText">Details will appear here.</p>
      <div id="dynamicCodeContainer" class="code-container" hidden="hidden">
        <code id="dynamicCodeBlock">https://unsubscribable.example.com</code>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
